name: Test Template
description: A test issue template
title: "[Test]: "
labels: ["enhancement"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Brief summary
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Provide more details
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Acknowledgment
      options:
        - label: I have searched for similar issues
          required: true
